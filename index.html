<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Brewster - Coffee & Cakes POS</title>
    <link rel="icon" type="image/x-icon" href="assets/images/icon.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<div class="main-wrapper d-flex">
    <!-- SIDEBAR -->
    <aside id="sidebar" class="p-4 d-flex flex-column text-white shadow">
        <div class="brand-logo mb-4">
            <h4 class="fw-bold text-white mb-0">
                <i class="fas fa-coffee text-warning me-2"></i>
                <span id="shop-name-display">Brewster (CAFE)</span>
            </h4>
            <small class="opacity-50">COFFEE & CAKES</small>
        </div>

        <nav class="flex-grow-1">
            <ul class="nav flex-column gap-2 p-0">
                <li class="nav-item nav-link text-white" onclick="view('dash')"><i class="fas fa-home me-2"></i> Dashboard</li>
                <li class="nav-item nav-link text-white" onclick="view('items')"><i class="fas fa-cookie-bite me-2"></i> Menu Item</li>
                <li class="nav-item nav-link text-white" onclick="view('cust')"><i class="fas fa-user-friends me-2"></i> Customers</li>
                <li class="nav-item nav-link text-white" onclick="view('bills')"><i class="fas fa-history me-2"></i> Bills</li>
                <li class="nav-item nav-link text-white" onclick="view('set')"><i class="fas fa-cog me-2"></i> Setting</li>
            </ul>
            <div class="sidebar-logo-bottom mt-5 text-center">
                <img src="assets/images/icon.png" alt="Logo" class="img-fluid opacity-75" style="width: 100px;">
            </div>
        </nav>

        <div class="sidebar-footer mt-auto pt-3 border-top border-secondary text-white small">
            <div class="d-flex align-items-center gap-2">
                <div>
                    <div class="fw-bold small text-uppercase" id="owner-name-display">Owner</div>
                    <div class="text-muted" style="font-size: 10px;">Online</div>
                </div>
            </div>
        </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main id="content-area" class="flex-grow-1 p-4 overflow-auto" style="height: 100vh;">
        <!-- DASHBOARD -->
        <section id="dash" class="spa-view">
            <div class="row mb-4 g-3">
                <div class="col-md-6"><div class="card auth-card p-4 text-white border-0 shadow-sm"><h5>Welcome back!</h5><button class="btn btn-warning btn-sm w-100 mt-2 fw-bold">Login</button></div></div>
                <div class="col-md-6"><div class="card auth-card p-4 text-white border-0 shadow-sm" style="background:#8b5e34"><h5>New Enrollment</h5><button class="btn btn-light btn-sm w-100 mt-2 fw-bold">Sign Up</button></div></div>
            </div>
            <div class="row">
                <div class="col-md-8">
                    <h4 class="fw-bold mb-3">Brew & Bites</h4>
                    <div class="row g-3" id="pos-grid"></div>
                </div>
                <div class="col-md-4">
                    <div class="card p-3 shadow-sm rounded-4 h-100 border-0 bg-white">
                        <h6 class="fw-bold border-bottom pb-2">Current Bill</h6>
                        <div id="cart-items-list" class="flex-grow-1 overflow-auto" style="min-height: 250px;"></div>
                        <hr>
                        <h5 class="fw-bold text-success">Total: LKR <span id="cart-total">0.00</span></h5>
                        <button class="btn btn-warning w-100 py-3 mt-3 fw-bold rounded-pill" onclick="pay()">PAY</button>
                    </div>
                </div>
            </div>
        </section>

        <!-- MENU ITEMS -->
        <section id="items" class="spa-view" style="display:none;">
            <h3 class="fw-bold mb-4">Manage Menu</h3>
            <div class="row g-4">
                <div class="col-md-4">
                    <div class="p-4 bg-white rounded-4 shadow-sm border">
                        <input type="text" id="item-name" class="form-control mb-2" placeholder="Item Name">
                        <input type="number" id="item-price" class="form-control mb-2" placeholder="Price">
                        <input type="text" id="item-img" class="form-control mb-3" placeholder="Image URL">
                        <button class="btn btn-coffee w-100 mb-3" onclick="addItem()">Add to Menu</button>
                        <div class="d-flex gap-2">
                            <button class="btn btn-primary flex-grow-1 btn-sm" onclick="updateItem()">Update</button>
                            <button class="btn btn-danger flex-grow-1 btn-sm" onclick="deleteItem()">Delete</button>
                            <button class="btn btn-secondary flex-grow-1 btn-sm" onclick="clearItemForm()">Clear</button>
                        </div>
                    </div>
                </div>
                <div class="col-md-8"><table class="table align-middle bg-white shadow-sm"><thead><tr><th>IMG</th><th>NAME</th><th>PRICE</th><th>ACTION</th></tr></thead><tbody id="item-table-body"></tbody></table></div>
            </div>
        </section>

        <!-- CUSTOMER -->
        <section id="cust" class="spa-view" style="display:none">
            <h4 class="mb-4 fw-bold">Customers</h4>
            <div class="row g-4">
                <div class="col-md-4">
                    <div class="p-3 bg-white rounded-4 border shadow-sm">
                        <input type="text" id="cn" class="form-control mb-2" placeholder="Name">
                        <input type="text" id="cp" class="form-control mb-2" placeholder="Phone">
                        <input type="email" id="c-email" class="form-control mb-3" placeholder="Email">
                        <button class="btn btn-coffee w-100 mb-2" onclick="saveC()">Register</button>
                        <div class="d-flex gap-2">
                            <button class="btn btn-primary flex-grow-1 btn-sm" onclick="updC()">Update</button>
                            <button class="btn btn-danger flex-grow-1 btn-sm" onclick="delC()">Delete</button>
                            <button class="btn btn-secondary flex-grow-1 btn-sm" onclick="$('#cn,#cp,#c-email').val('')">Clear</button>
                        </div>
                    </div>
                </div>
                <div class="col-md-8"><table class="table bg-white shadow-sm"><thead><tr><th>Name</th><th>Phone</th><th>Email</th><th>Action</th></tr></thead><tbody id="ct"></tbody></table></div>
            </div>
        </section>

        <!-- BILLS -->
        <section id="bills" class="spa-view" style="display:none">
            <h4 class="mb-4 fw-bold">Sales History</h4>
            <table class="table bg-white shadow-sm"><thead><tr><th>BILL ID</th><th>DATE</th><th>TOTAL</th></tr></thead><tbody id="bt"></tbody></table>
        </section>

        <!-- SETTINGS -->
        <section id="set" class="spa-view" style="display:none">
            <h4 class="mb-4 fw-bold">Settings</h4>
            <div class="card p-4 border-0 shadow-sm col-md-6 rounded-4 bg-white">
                <label class="small fw-bold">Cafe Name</label>
                <input type="text" id="snm" class="form-control mb-2">
                <label class="small fw-bold">Owner Name</label>
                <input type="text" id="onm" class="form-control mb-3">
                <button class="btn btn-coffee" onclick="saveSet()">Save Changes</button>
            </div>
        </section>
    </main>
</div>




<script type="module" src="Controller/DashboardController.js"></script>
<script type="module" src="Controller/CustomerController.js"></script>
<script type="module" src="Controller/ItemController.js"></script>
<script type="module" src="Controller/OrderController.js"></script>
<script type="module" src="Controller/SettingController.js"></script>

</body>
</html>
