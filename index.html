<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Brewster - Coffee & Cakes POS</title>
    <link rel="icon" type="image/x-icon" href="assets/images/icon.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<div class="main-wrapper d-flex">
    <!-- SIDEBAR -->
    <aside id="sidebar" class="p-4 d-flex flex-column text-white shadow">
        <div class="brand-logo mb-4">
            <h4 class="fw-bold text-white mb-0">
                <i class="fas fa-coffee text-warning me-2"></i>
                <span id="shop-name-display">Brewster (CAFE)</span>
            </h4>
            <small class="opacity-50">COFFEE & CAKES</small>
        </div>

        <nav class="flex-grow-1">
            <ul class="nav flex-column gap-2 p-0">
                <li class="nav-item nav-link text-white" style="cursor:pointer" onclick="view('dash')"><i class="fas fa-home me-2"></i> Dashboard</li>
                <li class="nav-item nav-link text-white" style="cursor:pointer" onclick="view('items')"><i class="fas fa-cookie-bite me-2"></i> Menu Item</li>
                <li class="nav-item nav-link text-white" style="cursor:pointer" onclick="view('cust')"><i class="fas fa-user-friends me-2"></i> Customers</li>
                <li class="nav-item nav-link text-white" style="cursor:pointer" onclick="view('bills')"><i class="fas fa-history me-2"></i> Bills</li>
                <li class="nav-item nav-link text-white" style="cursor:pointer" onclick="view('set')"><i class="fas fa-cog me-2"></i> Setting</li>
            </ul>
            <!-- logo -->
            <div class="text-center mt-4 sidebar-logo-container">
                <img src="assets/images/icon.png" alt="Logo" class="sidebar-custom-logo">
            </div>
        </nav>
        <!-- ownr -->
        <div class="sidebar-footer mt-auto pt-3 border-top border-secondary text-white small">
            <div class="d-flex align-items-center gap-2 mb-3">
                <div class="fw-bold small text-uppercase" id="owner-name-display">Owner: WRT</div>
            </div>
            <!-- Logout Button -->
            <button class="btn btn-outline-danger btn-sm w-100" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </div>
    </aside>
